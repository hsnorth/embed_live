<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #fafafa;
            padding: 24px;
            min-height: 100vh;
        }

        .email-viewer-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        .email-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 32px;
            transition: box-shadow 0.2s ease;
        }

        .email-card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .email-meta {
            margin-bottom: 24px;
        }

        .email-meta-row {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .email-meta-label {
            font-weight: 700;
            color: #000;
            min-width: 80px;
        }

        .email-meta-value {
            color: #555;
            flex: 1;
        }

        .email-body {
            font-size: 16px;
            line-height: 1.7;
            color: #444;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .email-card {
                padding: 20px;
            }

            .email-meta-row {
                gap: 12px;
                margin-bottom: 10px;
            }

            .email-meta-label {
                min-width: 70px;
                font-size: 14px;
            }

            .email-meta-value {
                font-size: 14px;
            }

            .email-body {
                font-size: 15px;
                line-height: 1.6;
            }
        }
    </style>
</head>
<body>
    <div class="email-viewer-wrapper">
        <div id="emailContainer"></div>
    </div>

    <script>
        const emails = [
            {
                to: "Jeffrey Epstein [jeevacation@gmail.com]",
                from: "Austin Hill",
                date: "Wed 3/19/2014 1:15:02 AM",
                subject: "Re: Please meet each other",
                body: "Hi Jeffrey,\n\nThanks [redacted] for the intro (moved to BCC).\n\nI'm doing some new work in the area of global finance technologies based on blockchain & bitcoin infrastructures. [redacted] suggested we find sometime to sit down in Vancouver this week. Would love to set something up.\n\nI can be reached by email or phone at [redacted]\n\nbest,\n-Austin"
            }
        ];

        function renderEmails() {
            const container = document.getElementById('emailContainer');
            container.innerHTML = '';

            emails.forEach((email) => {
                const card = document.createElement('div');
                card.className = 'email-card';
                card.innerHTML = `
                    <div class="email-meta">
                        <div class="email-meta-row">
                            <span class="email-meta-label">To:</span>
                            <span class="email-meta-value">${email.to}</span>
                        </div>
                        <div class="email-meta-row">
                            <span class="email-meta-label">From:</span>
                            <span class="email-meta-value">${email.from}</span>
                        </div>
                        <div class="email-meta-row">
                            <span class="email-meta-label">Sent:</span>
                            <span class="email-meta-value">${email.date}</span>
                        </div>
                        ${email.subject ? `<div class="email-meta-row">
                            <span class="email-meta-label">Subject:</span>
                            <span class="email-meta-value">${email.subject}</span>
                        </div>` : ''}
                    </div>
                    <div class="email-body">${email.body}</div>
                `;
                container.appendChild(card);
            });
        }

        window.addEventListener('DOMContentLoaded', renderEmails);
    </script>
</body>
</html>
