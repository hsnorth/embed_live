<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Chain Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: white;
            overflow: hidden;
        }

        body {
            font-family: 'Georgia', serif;
        }

        .email-chain-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            display: flex;
            flex-direction: column;
            height: 750px;
            max-height: 750px;
            position: relative;
            overflow: hidden;
        }

        .email-viewer {
            flex: 1;
            overflow: hidden;
            background: white;
            position: relative;
            width: 100%;
        }

        .email-carousel {
            display: flex;
            transition: transform 0.3s ease-out;
            touch-action: pan-y;
            width: 100%;
            height: 100%;
        }

        .email-page {
            width: 100%;
            min-width: 100%;
            padding: 28px;
            padding-top: 28px;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-in;
            gap: 18px;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .email-item {
            padding: 16px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .email-item:last-child {
            border-bottom: none;
        }

        .email-from {
            font-weight: 700;
            color: #000;
            font-size: 17px;
            margin-bottom: 4px;
        }

        .email-to {
            color: #666;
            font-size: 15px;
            margin-bottom: 2px;
        }

        .email-date {
            color: #999;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .email-subject {
            background: transparent;
            padding: 0;
            border-left: none;
            font-size: 15px;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .email-body {
            line-height: 1.6;
            color: #444;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Summary box - near top, left-aligned, max-width */
        .summary-box {
            position: absolute;
            top: 12px;
            left: 20px;
            width: 65%;
            max-width: 480px;
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 18px 22px 16px 22px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .summary-box.hidden {
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
        }

        .summary-content {
            flex: 1;
        }

        .summary-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .summary-text {
            font-size: 15px;
            color: #555;
            line-height: 1.5;
        }

        .summary-close {
            background: none;
            border: none;
            font-size: 16px;
            color: #999;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .summary-close:hover {
            color: #333;
        }

        /* Summary trigger text - top right */
        .summary-trigger {
            position: absolute;
            top: 10px;
            right: 28px;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 5;
        }

        .summary-trigger:hover {
            color: #666;
        }

        .summary-trigger.hidden {
            display: none;
        }

        /* Ripped paper edge at bottom of email area */
        .ripped-edge {
            position: relative;
            height: 12px;
            background: white;
            flex-shrink: 0;
        }

        .ripped-edge::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 12" preserveAspectRatio="none"><path d="M0,2 Q5,6 10,2 Q15,0 20,3 Q25,7 30,2 Q35,0 40,4 Q45,8 50,3 Q55,0 60,2 Q65,6 70,1 Q75,0 80,4 Q85,7 90,2 Q95,0 100,3 Q105,6 110,2 Q115,0 120,4 Q125,7 130,2 Q135,0 140,3 Q145,5 150,1 Q155,0 160,4 Q165,6 170,2 Q175,0 180,3 Q185,7 190,2 Q195,0 200,4 Q205,6 210,1 Q215,0 220,3 Q225,5 230,2 Q235,0 240,4 Q245,7 250,2 Q255,0 260,3 Q265,6 270,1 Q275,0 280,4 Q285,6 290,2 Q295,0 300,3 Q305,7 310,2 Q315,0 320,4 Q325,5 330,1 Q335,0 340,3 Q345,6 350,2 Q355,0 360,4 Q365,7 370,2 Q375,0 380,3 Q385,5 390,1 Q395,0 400,4 Q405,6 410,2 Q415,0 420,3 Q425,7 430,2 Q435,0 440,4 Q445,6 450,1 Q455,0 460,3 Q465,5 470,2 Q475,0 480,4 Q485,7 490,2 Q495,0 500,3 L500,12 L0,12 Z" fill="white"/></svg>') repeat-x;
            background-size: 100% 100%;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            background: #e8e8e8;
            flex-shrink: 0;
        }

        .nav-button {
            background: #000;
            color: white;
            border: none;
            padding: 9px 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Georgia', serif;
        }

        .nav-button:hover:not(:disabled) {
            background: #333;
        }

        .nav-button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .email-counter {
            text-align: center;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            min-width: 70px;
        }

        .dot-indicator {
            display: none;
        }

        @media (max-width: 768px) {
            .email-chain-container {
                height: 600px;
                max-height: 600px;
            }

            .email-page {
                padding: 20px;
                padding-top: 20px;
                gap: 16px;
            }

            .summary-box {
                width: calc(100% - 32px);
                max-width: none;
                left: 16px;
                right: 16px;
                top: 10px;
                padding: 16px 18px 14px 18px;
            }

            .summary-title {
                font-size: 15px;
            }

            .summary-text {
                font-size: 14px;
            }

            .controls {
                padding: 12px 20px;
                gap: 6px;
            }

            .nav-button {
                padding: 8px 14px;
                font-size: 13px;
            }

            .email-counter {
                font-size: 13px;
                min-width: 60px;
            }

            .email-from {
                font-size: 16px;
            }

            .email-body {
                font-size: 14px;
            }

            .summary-trigger {
                right: 20px;
            }

            .dot-indicator {
                display: flex;
                justify-content: center;
                gap: 5px;
                padding: 10px 0;
                background: white;
                flex-shrink: 0;
            }

            .dot {
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: #ddd;
                cursor: pointer;
                transition: all 0.2s;
            }

            .dot.active {
                background: #000;
                transform: scale(1.25);
            }
        }
    </style>
</head>
<body>
    <div class="email-chain-container">
        <div class="email-viewer">
            <!-- Summary trigger text - top right -->
            <div class="summary-trigger hidden" id="summaryTrigger" onclick="openSummary()">Summary</div>
            
            <div class="email-carousel" id="emailCarousel"></div>
            
            <!-- Summary box - near top, left-aligned, max-width -->
            <div class="summary-box" id="summaryBox">
                <div class="summary-content">
                    <div class="summary-title">The first meeting</div>
                    <div class="summary-text" id="summaryText">Loading summary...</div>
                </div>
                <button class="summary-close" onclick="closeSummary()">✕</button>
            </div>
        </div>

        <div class="dot-indicator" id="dotIndicator"></div>
        <div class="ripped-edge"></div>

        <div class="controls">
            <button class="nav-button" id="prevBtn" onclick="previousPage()">
                ← Previous
            </button>
            <div class="email-counter">
                <span id="currentPage">1</span> / <span id="totalPages">1</span>
            </div>
            <button class="nav-button" id="nextBtn" onclick="nextPage()">
                Next →
            </button>
        </div>
    </div>

    <script>
        const emails = [
            {
                from: "Austin Hill",
                to: "Jeffrey Epstein",
                date: "Wed, Mar 19, 2014, 1:15 AM",
                subject: "Re: Please meet each other",
                body: "Hi Jeffrey,\n\nThanks [redacted] for the intro (moved to BCC).\n\nI'm doing some new work in the area of global finance technologies based on blockchain & bitcoin infrastructures. [redacted] suggested we find sometime to sit down in Vancouver this week. Would love to set something up.\n\nI can be reached by email or phone at [redacted]\n\nbest,\n-Austin"
            },
            {
                from: "[Intermediary]",
                to: "[Intermediary]",
                date: "Wed, Mar 19, 2014",
                subject: "",
                body: "Austin did email. Hmmm...\n\nAustin - can you get over to the fairmont pacific Rim?\n\nJeff will be the one with salt & pepper hair, a huge grin, and 1-2 gorgeous women circling him.\n\nAustin has an equally large grin.\n\n;-)"
            },
            {
                from: "Jeffrey Epstein",
                to: "",
                date: "Wed, Mar 19, 2014, 10:58 AM",
                subject: "",
                body: "he didn't email me , I will be same place fairmont pacific rim from 12 30 all day"
            },
            {
                from: "Jeffrey Epstein",
                to: "Austin Hill",
                date: "Wed, Mar 19, 2014, 11:48 PM",
                subject: "Re: Austin Hill & Jeffrey",
                body: "2 min\n\nOn Wednesday, March 19, 2014, Jeffrey Epstein jeevacation@gmail.com wrote:\npacific rim fairmont im with two pretty girls"
            },
            {
                from: "Austin Hill",
                to: "Jeffrey Epstein",
                date: "Wed, Mar 19, 2014, 4:13 PM",
                subject: "",
                body: "I'm sitting in the lobby across from reception Fairmont waterfront.\n\nSent from Mailbox for iPhone"
            },
            {
                from: "Austin Hill",
                to: "Jeffrey Epstein",
                date: "Wed, Mar 19, 2014, 4:09 PM",
                subject: "",
                body: "Here - where are you? I'm the guy who obviously conquered anorexia (big) dressed in black.\n\nSent from Mailbox for iPhone"
            },
            {
                from: "Austin Hill",
                to: "Jeffrey Epstein",
                date: "Wed, Mar 19, 2014, 3:58 PM",
                subject: "",
                body: "On my way over 5 min\n\nSent from Mailbox for iPhone"
            },
            {
                from: "Jeffrey Epstein",
                to: "Austin Hill",
                date: "Wed, Mar 19, 2014, 3:12 PM",
                subject: "",
                body: "Coming?"
            },
            {
                from: "Austin Hill",
                to: "Jeffrey Epstein",
                date: "Wed, Mar 19, 2014",
                subject: "",
                body: "Happy to make it to the Fairmont."
            },
            {
                from: "Austin Hill",
                to: "Jeffrey Epstein",
                date: "Thu, Mar 20, 2014, 2:09 AM",
                subject: "Re: Austin Hill & Jeffrey",
                body: "Jeffrey,\n\nIt's was really great to meet you.\n\nI enjoyed our conversation immensely. Would live the chance to spend an afternoon continuing the discussion and learning more about money from you ;)\n\nI know we share at least a few hobbies & interests already.\n\nI'm happy to travel - so hopefully we can meet in NY or St. Thomas in April or May.\n\nMy cell is [redacted]\n\nbest,\nAustin\n\nPs - yes they were pretty :)"
            }
        ];

        const summarySummary = "Austin Hill introduces his blockchain finance work to Jeffrey Epstein and arranges an in-person meeting at a Vancouver hotel.";

        let currentPage = 0;
        let pages = [];
        let summaryOpen = true;

        function groupEmailsIntoPages() {
            pages = [];
            // Page 1: Austin's intro email
            pages.push([emails[0]]);
            // Page 2: Intermediary + Epstein "he didn't email me"
            pages.push([emails[1], emails[2]]);
            // Page 3: Austin "Happy to make it" + Epstein "Coming?"
            pages.push([emails[8], emails[7]]);
            // Page 4: Austin "On my way" + Austin "where are you?"
            pages.push([emails[6], emails[5]]);
            // Page 5: Austin "lobby" + Epstein "two pretty girls"
            pages.push([emails[4], emails[3]]);
            // Page 6: Austin's follow-up
            pages.push([emails[9]]);
        }

        function initializeCarousel() {
            groupEmailsIntoPages();
            const carousel = document.getElementById('emailCarousel');
            const dotIndicator = document.getElementById('dotIndicator');

            pages.forEach((pageEmails, pageIndex) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'email-page';

                pageEmails.forEach((email) => {
                    const emailDiv = document.createElement('div');
                    emailDiv.className = 'email-item';
                    emailDiv.innerHTML = `
                        <div class="email-from">From: ${email.from}</div>
                        ${email.to ? `<div class="email-to">To: ${email.to}</div>` : ''}
                        <div class="email-date">${email.date}</div>
                        ${email.subject ? `<div class="email-subject">Subject: ${email.subject}</div>` : ''}
                        <div class="email-body">${email.body}</div>
                    `;
                    pageDiv.appendChild(emailDiv);
                });

                carousel.appendChild(pageDiv);

                const dot = document.createElement('div');
                dot.className = 'dot' + (pageIndex === 0 ? ' active' : '');
                dot.onclick = () => goToPage(pageIndex);
                dotIndicator.appendChild(dot);
            });

            document.getElementById('totalPages').textContent = pages.length;
            document.getElementById('summaryText').textContent = summarySummary;
            updateControls();
        }

        function updateCarouselPosition() {
            const carousel = document.getElementById('emailCarousel');
            carousel.style.transform = `translateX(-${currentPage * 100}%)`;

            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentPage);
            });

            document.getElementById('currentPage').textContent = currentPage + 1;
            updateControls();
        }

        function updateControls() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage === pages.length - 1;
        }

        function nextPage() {
            if (currentPage < pages.length - 1) {
                currentPage++;
                updateCarouselPosition();
                // Auto-close summary when navigating
                if (summaryOpen) {
                    closeSummary();
                }
            }
        }

        function previousPage() {
            if (currentPage > 0) {
                currentPage--;
                updateCarouselPosition();
                // Auto-close summary when navigating
                if (summaryOpen) {
                    closeSummary();
                }
            }
        }

        function goToPage(index) {
            currentPage = index;
            updateCarouselPosition();
            // Auto-close summary when navigating
            if (summaryOpen) {
                closeSummary();
            }
        }

        function closeSummary() {
            document.getElementById('summaryBox').classList.add('hidden');
            document.getElementById('summaryTrigger').classList.remove('hidden');
            summaryOpen = false;
        }

        function openSummary() {
            document.getElementById('summaryBox').classList.remove('hidden');
            document.getElementById('summaryTrigger').classList.add('hidden');
            summaryOpen = true;
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') previousPage();
            if (e.key === 'Escape') closeSummary();
        });

        let touchStartX = 0;
        let touchEndX = 0;

        const carousel = document.getElementById('emailCarousel');
        carousel.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        carousel.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextPage();
                else previousPage();
            }
        });

        window.addEventListener('DOMContentLoaded', initializeCarousel);
    </script>
</body>
</html>
